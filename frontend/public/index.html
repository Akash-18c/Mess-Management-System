<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/messy-logo.png" type="image/png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/messy-logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F172A" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/messy-logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="true" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>The Messy Kitchen — Mess Management</title>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #020a12 0%, #041609 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash img { width: 120px; height: 120px; object-fit: contain;
        filter: drop-shadow(0 0 24px rgba(16,185,129,0.6)) drop-shadow(0 0 8px rgba(245,158,11,0.3));
        animation: pulse 1.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.07);opacity:0.85} }
      #splash p { color: rgba(110,231,183,0.7); font-family: sans-serif;
        font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
        margin-top: 20px; }
      #splash-ring {
        width: 140px; height: 140px; position: absolute;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: rgba(52,211,153,0.8);
        border-right-color: rgba(52,211,153,0.3);
        animation: spin 1.1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div style="position:relative;display:flex;align-items:center;justify-content:center;">
        <div id="splash-ring"></div>
        <img src="%PUBLIC_URL%/messy-logo.png" alt="The Messy Kitchen" />
      </div>
      <p>Loading…</p>
    </div>
    <script>window.__hideSplash=function(){var s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(function(){s.remove();},500);}}</script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
